<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header bg-light text-black">

      <h3>
        Employee Details
      </h3>

    </div>

    <div class="card-body">

      <div *ngIf="employee !== null">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label>ID</label>
            <input
              class="form-control"
              [value]="employee.employeeId"
              readonly>
          </div>

          <div class="col-md-6 mb-3">
            <label>Code</label>
            <input
              class="form-control"
              [value]="employee.employeeCode"
              readonly>
          </div>

          <div class="col-md-6 mb-3">
            <label>Name</label>
            <input
              class="form-control"
              [value]="employee.name"
              readonly>
          </div>

          <div class="col-md-6 mb-3">
            <label>Email</label>
            <input
              class="form-control"
              [value]="employee.email"
              readonly>
          </div>

          <div class="col-md-6 mb-3">
            <label>Phone</label>
            <input
              class="form-control"
              [value]="employee.phoneNumber"
              readonly>
          </div>

          <div class="col-md-6 mb-3">
            <label>Department Name</label>
            <input
              class="form-control"
              [value]="employee.departmentName" //changing now 
              readonly>
          </div>

          <div class="col-md-6 mb-3">
            <label>Designation</label>
            <input
              class="form-control"
              [value]="employee.designation"
              readonly>
          </div>

          <div class="col-md-6 mb-3">
            <label>Joining Date</label>
            <input
              class="form-control"
              [value]="employee.joiningDate"
              readonly>
          </div>

          <div class="col-md-6 mb-3">
            <label>Salary</label>
            <input
              class="form-control"
              [value]="employee.salary"
              readonly>
          </div>

        </div>

        <button
          class="btn btn-secondary mt-3"
          (click)="goBack()">

          Back

        </button>

      </div>

      <div *ngIf="employee === null">

        <div class="alert alert-info">

          Loading Employee Details...

        </div>

      </div>

    </div>

  </div>

</div>
