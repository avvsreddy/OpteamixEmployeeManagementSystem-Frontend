<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header bg-light">

      <h3>Edit Employee</h3>

    </div>

    <div class="card-body">

      <div
         *ngIf="formSubmitted && !isFormValid()"
          class="alert alert-danger">

          Mandatory fields are not filled correctly.

      </div>


      <input
        class="form-control mb-1"
        [(ngModel)]="employee.employeeCode"
        [class.is-invalid]="
          formSubmitted &&
          !employee.employeeCode
        ">

      <div
        class="text-danger mb-3"
        *ngIf="
          formSubmitted &&
          !employee.employeeCode
        ">
      
        Employee Code is required
      
      </div>

      <input
        class="form-control mb-1"
        [(ngModel)]="employee.name"
        [class.is-invalid]="
        formSubmitted &&
        !employee.name
      ">

      <div
        class="text-danger mb-3"
        *ngIf="
          formSubmitted &&
          !employee.name
        ">
      
        Name is required
          
      </div>

      <input
        class="form-control mb-1"
        [(ngModel)]="employee.email"
        [class.is-invalid]="
          formSubmitted &&
          (
            !employee.email ||
            !isValidEmail()
          )
        ">

      <div
        class="text-danger mb-2"
        *ngIf="
          formSubmitted &&
          !employee.email
        ">

        Email is required

      </div>

      <div
        class="text-danger mb-3"
        *ngIf="
          formSubmitted &&
          employee.email &&
          !isValidEmail()
        ">

        Enter a valid email address

      </div>

      <input
        class="form-control mb-1"
        [(ngModel)]="employee.phoneNumber"
        [class.is-invalid]="
          formSubmitted &&
          !isValidPhone()
        ">

      <div
        class="text-danger mb-3"
        *ngIf="
          formSubmitted &&
          !isValidPhone()
        ">
      
        Phone number must contain exactly 10 digits
          
      </div>

      <input
        class="form-control mb-1"
        [(ngModel)]="employee.designation"
        [class.is-invalid]="
          formSubmitted &&
          !employee.designation
        ">

      <div
        class="text-danger mb-3"
        *ngIf="
          formSubmitted &&
          !employee.designation
        ">

        Designation is required

      </div>

      <input
        type="date"
        class="form-control mb-1"
        [(ngModel)]="employee.joiningDate"
        [class.is-invalid]="
          formSubmitted &&
          !employee.joiningDate
        ">

      <div
        class="text-danger mb-3"
        *ngIf="
          formSubmitted &&
          !employee.joiningDate
        ">
      
        Joining Date is required

      </div>

    <input
      type="number"
      class="form-control mb-1"
      [(ngModel)]="employee.salary"
      [class.is-invalid]="
        formSubmitted &&
        employee.salary <= 0
      ">

    <div
      class="text-danger mb-3"
      *ngIf="
        formSubmitted &&
        employee.salary <= 0
      ">

      Salary must be greater than 0

    </div>

    <button
      class="btn btn-success"
      (click)="updateEmployee()">
    
      Update Employee
      
    </button>

    </div>

  </div>

</div>
