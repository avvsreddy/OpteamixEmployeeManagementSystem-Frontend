<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Navbar</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom bg-white">
        <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand" href="#">
                <i class="bi bi-bezier2 logo"></i>
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav mx-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link" routerLinkActive="highlight" routerLink="home">Home</a>
                    </li>

                </ul>

                <ul class="navbar-nav mx-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link" routerLinkActive="highlight" routerLink="report">Report</a>
                    </li>

                </ul>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button class="btn btn-signin">
                        Sign in
                    </button>

                    <button class="btn btn-register">
                        Register
                    </button>
                </div>

            </div>
        </div>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
