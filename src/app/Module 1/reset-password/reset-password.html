<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <h2><i class="bi bi-shield-lock-fill me-2"></i>Opteamix</h2>
      <p>Employee Management System</p>
    </div>

    <h5 class="text-center mb-4 fw-bold">Reset Password 🔐</h5>

    <div *ngIf="successMessage" class="alert alert-success">
      <i class="bi bi-check-circle me-2"></i>{{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
    </div>

    <form (ngSubmit)="onResetPassword()">

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-envelope"></i>
          </span>
          <input
            type="email"
            class="form-control"
            placeholder="Enter your email"
            [(ngModel)]="email"
            name="email"
            required>
        </div>
      </div>

      <!-- OTP -->
      <div class="mb-3">
        <label class="form-label fw-semibold">OTP Code</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-key"></i>
          </span>
          <input
            type="text"
            class="form-control"
            placeholder="Enter 6 digit OTP from email"
            [(ngModel)]="token"
            name="token"
            maxlength="6"
            required>
        </div>
        <small class="text-muted">Enter the 6 digit OTP sent to your email</small>
      </div>

      <!-- New Password -->
      <div class="mb-4">
        <label class="form-label fw-semibold">New Password</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-lock"></i>
          </span>
          <input
            type="password"
            class="form-control"
            placeholder="Enter new password"
            [(ngModel)]="newPassword"
            name="newPassword"
            required>
        </div>
        <small class="text-muted">
          Must contain uppercase, lowercase, number and special character
        </small>
      </div>

      <button
        type="submit"
        class="btn btn-primary mb-3"
        [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        <i *ngIf="!isLoading" class="bi bi-check-lg me-2"></i>
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>

      <hr>

      <div class="text-center">
        <a routerLink="/forgot-password" class="text-decoration-none fw-semibold">
          <i class="bi bi-arrow-left me-1"></i>Resend OTP
        </a>
        &nbsp;|&nbsp;
        <a routerLink="/login" class="text-decoration-none fw-semibold">
          Login
        </a>
      </div>

    </form>
  </div>
</div>
