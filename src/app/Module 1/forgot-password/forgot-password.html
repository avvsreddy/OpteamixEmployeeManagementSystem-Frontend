<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <h2><i class="bi bi-shield-lock-fill me-2"></i>Opteamix</h2>
      <p>Employee Management System</p>
    </div>

    <h5 class="text-center mb-4 fw-bold">Forgot Password? 🔑</h5>

    <div *ngIf="successMessage" class="alert alert-success">
      <i class="bi bi-check-circle me-2"></i>{{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      <i class="bi bi-exclamation-circle me-2"></i>{{ errorMessage }}
    </div>

    <form (ngSubmit)="onForgotPassword()">

      <div class="mb-4">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-envelope"></i>
          </span>
          <input
            type="email"
            class="form-control"
            placeholder="Enter your email"
            [(ngModel)]="email"
            name="email"
            required>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary mb-3"
        [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
        <i *ngIf="!isLoading" class="bi bi-send me-2"></i>
        {{ isLoading ? 'Sending...' : 'Send Reset Email' }}
      </button>

      <hr>

      <div class="text-center">
        <a routerLink="/login" class="text-decoration-none fw-semibold">
          <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>
      </div>

    </form>
  </div>
</div>
