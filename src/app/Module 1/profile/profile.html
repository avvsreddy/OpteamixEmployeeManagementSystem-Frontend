<div class="container mt-4">

  <!-- Loading -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2">Loading...</p>
  </div>

  <!-- Profile Content -->
 <div *ngIf="!isLoading">
    <div class="row">
      <div class="col-md-4 mb-4">
        <div class="profile-card text-center">

          <div class="profile-avatar-wrapper text-center">
            <img *ngIf="user.hasProfileImage" 
              [src]="profileImageUrl" 
              class="profile-avatar-img"
              alt="Profile">
            
            <div *ngIf="!user.hasProfileImage" class="profile-avatar">
              <i class="bi bi-person-fill"></i>
            </div>

            <div class="mt-2 mb-3">
              <input type="file" #fileInput hidden 
                accept="image/*" 
                (change)="onFileSelected($event)">
              <button class="btn btn-outline-primary btn-sm" 
                (click)="fileInput.click()">
                <i class="bi bi-camera me-1"></i>Change Photo
              </button>
            </div>
          </div>

          <div *ngIf="showCropper" class="mt-3">

  <image-cropper

    [imageChangedEvent]="imageChangedEvent"

    [maintainAspectRatio]="true"

    [aspectRatio]="1/1"

    format="png"

    (imageCropped)="imageCropped($event)">

  </image-cropper>

  <button

    class="btn btn-success mt-3"

    (click)="saveCroppedImage()">

    Save Photo

  </button>

</div>

          <h4 class="fw-bold">{{ user.fullName }}</h4>
          <p class="text-muted">{{ user.email }}</p>
          <span class="badge bg-primary fs-6 mb-3">
            {{ getRole() }}
          </span>
          <button class="btn btn-outline-danger w-100 mt-3" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>Logout
          </button>
        </div>
      </div>

      <div class="col-md-8 mb-4">
        <div class="profile-card">
          <h5 class="fw-bold mb-4">Profile Details</h5>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" class="form-control" 
                [(ngModel)]="user.fullName" 
                name="fullName"
                [readonly]="!isEditing">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="text" class="form-control" 
                [(ngModel)]="user.email" 
                name="email"
                readonly>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Phone</label>
              <input type="text" class="form-control" 
                [(ngModel)]="user.phoneNumber" 
                name="phoneNumber"
                [readonly]="!isEditing">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Department</label>
              <input type="text" class="form-control" 
                [(ngModel)]="user.department" 
                name="department"
                [readonly]="!isEditing">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Employee Code</label>
              <input type="text" class="form-control" 
                [(ngModel)]="user.employeeCode" 
                name="employeeCode"
                [readonly]="!isEditing">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Role</label>
              <input type="text" class="form-control" 
                 [value]="getRole()"
                readonly>
            </div>
          </div>

          <button class="btn btn-primary me-2" (click)="isEditing = !isEditing">
            {{ isEditing ? 'Cancel' : 'Edit Profile' }}
          </button>

          <button *ngIf="isEditing" class="btn btn-success" (click)="onUpdate()">
            Save Changes
          </button>

        </div>
      </div>
    </div>
  </div>
</div>
