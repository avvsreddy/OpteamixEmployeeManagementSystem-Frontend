<div class="auth-shell">
  <div class="auth-form-wrap">

    <div class="auth-mark">
      <span class="mark-icon"><i class="bi bi-shield-lock-fill"></i></span>
      Opteamix
    </div>

    <div class="form-eyebrow">Get started</div>
    <h2>Create your account</h2>
    <p class="form-sub">It only takes a minute.</p>

    <div *ngIf="successMessage" class="auth-alert auth-alert-success">
      <i class="bi bi-check-circle"></i>
      <span>{{ successMessage }}</span>
    </div>

    <div *ngIf="errorMessage" class="auth-alert auth-alert-error">
      <i class="bi bi-exclamation-circle"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <form (ngSubmit)="onRegister()">

      <div class="auth-field">
        <label>Full name</label>
        <div class="auth-input-group">
          <i class="bi bi-person"></i>
          <input
            type="text"
            placeholder="Your full name"
            [(ngModel)]="fullName"
            name="fullName"
            required>
        </div>
      </div>

      <div class="auth-field">
        <label>Email address</label>
        <div class="auth-input-group">
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            placeholder="you@opteamix.com"
            [(ngModel)]="email"
            name="email"
            required>
        </div>
      </div>

      <div class="auth-field">
        <label>Password</label>
        <div class="auth-input-group">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            placeholder="Create a password"
            [(ngModel)]="password"
            name="password"
            required>
        </div>
        <div class="auth-hint">8+ characters, with uppercase, lowercase, number and symbol</div>
      </div>

      <button type="submit" class="auth-submit" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
        <i *ngIf="!isLoading" class="bi bi-arrow-right"></i>
        {{ isLoading ? 'Creating account…' : 'Create account' }}
      </button>

      <div class="auth-divider"></div>

      <div class="auth-footer-link">
        Already have an account? <a routerLink="/login">Sign in</a>
      </div>

    </form>
  </div>
</div>
