<div class="auth-shell">
  <div class="auth-form-wrap">

    <div class="auth-mark">
      <span class="mark-icon"><i class="bi bi-shield-lock-fill"></i></span>
      Opteamix
    </div>

    <div class="form-eyebrow">Welcome back</div>
    <h2>Sign in to your account</h2>
    <p class="form-sub">Enter your credentials to continue.</p>

    <div *ngIf="errorMessage" class="auth-alert auth-alert-error">
      <i class="bi bi-exclamation-circle"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <form (ngSubmit)="onLogin()">

      <div class="auth-field">
        <label>Email address</label>
        <div class="auth-input-group">
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            placeholder="you@opteamix.com"
            [(ngModel)]="email"
            name="email"
            required>
        </div>
      </div>

      <div class="auth-field">
        <label>Password</label>
        <div class="auth-input-group">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            placeholder="Enter your password"
            [(ngModel)]="password"
            name="password"
            required>
        </div>
      </div>

      <button type="submit" class="auth-submit" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span>
        <i *ngIf="!isLoading" class="bi bi-arrow-right"></i>
        {{ isLoading ? 'Signing in…' : 'Sign in' }}
      </button>

      <div class="text-center mt-3">
        <a routerLink="/forgot-password" class="auth-footer-link">
          <span>Forgot your password?</span>
        </a>
      </div>

      <div class="auth-divider"></div>

      <div class="auth-footer-link">
        New to Opteamix? <a routerLink="/register">Create an account</a>
      </div>

    </form>
  </div>
</div>
